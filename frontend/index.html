<!doctype html>
<html lang="zh-CN" data-theme="aurora-glass">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Palworld Mod Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="backgroundLayer" class="background-layer" aria-hidden="true"></div>
  <canvas id="petalCanvas" aria-hidden="true"></canvas>
  <div class="app-shell">
    <aside class="sidebar glass-panel">
      <div class="brand"><span class="brand-mark">P</span><div><strong>Palworld Mods</strong><small>桌面管理器</small></div></div>
      <nav aria-label="主导航">
        <button type="button" class="nav-item active" data-action="showMods" data-view="mods">我的模组</button>
        <button type="button" class="nav-item" data-action="showImport" data-view="import">导入安装</button>
        <button type="button" class="nav-item" data-action="showNexus" data-view="nexus">N网热门</button>
        <button type="button" class="nav-item" data-action="showSettings" data-view="settings">设置与外观</button>
      </nav>
      <div class="sidebar-foot">
        <span id="healthStatus" class="status-dot">正在连接…</span>
        <span id="pathChip" class="path-chip">未配置游戏目录</span>
        <button type="button" class="btn subtle" data-action="restartAdmin">以管理员身份重启</button>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div><h1 id="viewTitle">我的模组</h1><p id="viewSubtitle">管理已安装的模组</p></div>
        <div class="top-actions">
          <button type="button" class="btn" data-action="refreshMods">刷新模组</button>
          <button type="button" class="btn primary" data-action="openModsFolder">打开模组文件夹</button>
        </div>
      </header>

      <section id="view-mods" class="view active" aria-labelledby="viewTitle">
        <div class="toolbar glass-panel">
          <label class="grow">筛选模组<input id="modFilter" type="search" data-action="filterMods" placeholder="名称、类型或 N 网尾号"></label>
          <span id="modStats">共 0 个模组</span>
        </div>
        <div id="modList" class="card-list" aria-live="polite"></div>
      </section>

      <section id="view-import" class="view" aria-labelledby="viewTitle">
        <div class="two-column">
          <div id="dropzone" class="dropzone glass-panel">
            <span class="drop-symbol">⇩</span><h2>拖放 ZIP / PAK</h2><p>自动识别结构并安装，无需手动解压。</p>
            <button type="button" class="btn primary" data-action="chooseModFile">选择文件</button>
            <input id="modFileInput" type="file" data-action="selectModFile" accept=".zip,.pak,application/zip">
          </div>
          <div class="glass-panel panel">
            <label>安装类型<select id="importType" data-action="changeImportType"><option value="auto">自动识别</option><option value="pak">PAK</option><option value="logicpak">LogicMods</option><option value="ue4ss">UE4SS 脚本</option><option value="ue4ss_framework">UE4SS 框架</option><option value="workshop">Workshop</option></select></label>
            <label>显示名称<input id="importName" type="text" data-action="editImportName" placeholder="可选"></label>
            <label>N 网尾号<input id="importNexusId" type="number" data-action="editImportNexusId" min="1" placeholder="可选"></label>
            <p id="selectedModFile" class="muted">尚未选择文件</p>
            <button type="button" class="btn primary" data-action="importMod">开始安装</button>
            <div id="importResult" class="result" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <section id="view-nexus" class="view" aria-labelledby="viewTitle">
        <div class="toolbar glass-panel">
          <label class="grow">搜索 N 网<input id="nexusQuery" type="search" data-action="editNexusQuery" placeholder="名称或模组尾号"></label>
          <button type="button" class="btn primary" data-action="searchNexus">搜索</button>
          <button type="button" class="btn" data-action="refreshNexus">热门下载</button>
          <button type="button" class="btn" data-action="latestNexus">最新上传</button>
        </div>
        <p id="nexusStatus" class="muted">等待加载</p>
        <div id="nexusGrid" class="nexus-grid"></div>
      </section>

      <section id="view-settings" class="view" aria-labelledby="viewTitle">
        <div class="settings-grid">
          <article class="glass-panel panel">
            <h2>游戏与工具</h2>
            <label>游戏目录<input id="gamePathInput" type="text" data-action="editGamePath" placeholder="含 Palworld.exe 的目录"></label>
            <div class="button-row"><button type="button" class="btn" data-action="autoDetectGame">自动检测</button><button type="button" class="btn primary" data-action="saveGamePath">保存路径</button><button type="button" class="btn" data-action="repairFolders">修复目录</button></div>
            <div id="detectList" class="stack"></div><div id="pathInfo" class="result"></div>
            <hr><p id="ue4ssStatus" class="muted">UE4SS 状态未知</p>
            <div class="button-row"><button type="button" class="btn primary" data-action="installUe4ss">在线安装 UE4SS</button><button type="button" class="btn" data-action="refreshUe4ss">刷新状态</button><button type="button" class="btn" data-action="chooseUe4ssZip">本地 ZIP</button></div>
            <input id="ue4ssZipInput" type="file" data-action="selectUe4ssZip" accept=".zip,application/zip">
            <div id="ue4ssResult" class="result"></div>
            <hr><p id="updateStatus" class="muted">尚未检查更新</p>
            <div class="button-row"><button type="button" class="btn" data-action="checkUpdate">检查更新</button><button type="button" class="btn primary" data-action="applyUpdate">安装更新</button></div>
          </article>

          <article class="glass-panel panel appearance-panel">
            <h2>主题与背景</h2>
            <div class="theme-picker" aria-label="主题"><button type="button" data-action="themeAurora" class="theme-card" data-theme-value="aurora-glass">极光玻璃</button><button type="button" data-action="themeIvory" class="theme-card" data-theme-value="ivory-sakura">象牙樱花</button><button type="button" data-action="themeStarlit" class="theme-card" data-theme-value="starlit-night">星夜</button></div>
            <div class="button-row"><button type="button" class="btn" data-action="chooseBackground">选择背景</button><button type="button" class="btn" data-action="resetBackground">恢复默认</button></div>
            <input id="backgroundInput" type="file" data-action="selectBackground" accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp">
            <label>遮罩 <output id="maskValue">35%</output><input id="maskRange" type="range" data-action="changeMask" min="0" max="85" value="35"></label>
            <label>模糊 <output id="blurValue">0px</output><input id="blurRange" type="range" data-action="changeBlur" min="0" max="24" value="0"></label>
            <fieldset><legend>背景位置</legend><div class="position-grid"><button type="button" data-action="positionTopLeft" data-position="top-left">↖</button><button type="button" data-action="positionTopCenter" data-position="top-center">↑</button><button type="button" data-action="positionTopRight" data-position="top-right">↗</button><button type="button" data-action="positionCenterLeft" data-position="center-left">←</button><button type="button" data-action="positionCenter" data-position="center">·</button><button type="button" data-action="positionCenterRight" data-position="center-right">→</button><button type="button" data-action="positionBottomLeft" data-position="bottom-left">↙</button><button type="button" data-action="positionBottomCenter" data-position="bottom-center">↓</button><button type="button" data-action="positionBottomRight" data-position="bottom-right">↘</button></div></fieldset>
            <label>樱花密度<select id="petalLevel" data-action="changePetals"><option value="off">关闭</option><option value="low">低</option><option value="medium">中</option><option value="high">高</option></select></label>
            <button type="button" class="btn primary" data-action="saveAppearance">保存外观</button>
          </article>
        </div>
      </section>
    </main>
  </div>

  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>
  <div id="busyOverlay" class="busy-overlay" hidden><div class="spinner"></div><span id="busyText">处理中…</span></div>
  <dialog id="conflictModal"><form method="dialog" class="modal-card"><h2>发现文件冲突</h2><div id="conflictDetails"></div><div class="button-row"><button type="button" class="btn" data-action="cancelConflict">取消</button><button type="button" class="btn primary" data-action="confirmConflict">继续安装</button></div></form></dialog>
  <dialog id="deleteModal"><form method="dialog" class="modal-card"><h2>删除模组</h2><p id="deleteMessage">此操作不可撤销。</p><div class="button-row"><button type="button" class="btn" data-action="cancelDelete">取消</button><button type="button" class="btn danger" data-action="approveDelete">确认删除</button></div></form></dialog>
  <script type="module" src="app.js"></script>
</body>
</html>
